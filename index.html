<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哲学思想タイプ診断</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0c0c18;
    --surface:   #14142a;
    --border:    #272748;
    --text:      #e8e8f0;
    --sub:       #8b8baa;
    --accent:    #7c3aed;
    --accent2:   #2563eb;
  }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px 60px;
  }

  .container { width: 100%; max-width: 680px; }

  /* ===== SCREEN TRANSITIONS ===== */
  .screen { display: none; animation: fadeIn .3s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

  /* ===== START ===== */
  #start { text-align: center; padding: 80px 20px; }
  .logo { font-size: 52px; margin-bottom: 20px; }
  h1 {
    font-size: 26px; font-weight: 800; letter-spacing: .04em;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 12px;
  }
  .subtitle { color: var(--sub); font-size: 14px; line-height: 1.8; margin-bottom: 48px; }
  .meta-info {
    display: inline-flex; gap: 24px; margin-bottom: 40px;
    font-size: 12px; color: var(--sub);
  }
  .meta-info span { display: flex; align-items: center; gap: 6px; }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; padding: 16px 52px;
    font-size: 17px; font-weight: 700; border-radius: 50px;
    cursor: pointer; letter-spacing: .05em;
    transition: transform .2s, box-shadow .2s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,.4); }

  /* ===== QUIZ ===== */
  #quiz { padding-top: 8px; }
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .q-counter { font-size: 12px; color: var(--sub); font-weight: 600; }
  .prog-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 4px; margin: 0 16px; }
  .prog-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .5s ease;
  }

  .q-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 36px; margin-bottom: 20px;
  }
  .q-label {
    font-size: 11px; color: var(--accent); font-weight: 700;
    letter-spacing: .15em; text-transform: uppercase; margin-bottom: 10px;
  }
  .q-text { font-size: 19px; line-height: 1.65; font-weight: 600; }

  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 16px 20px;
    border-radius: 14px; cursor: pointer;
    text-align: left; font-size: 14px; line-height: 1.4;
    display: flex; align-items: center; gap: 14px;
    transition: background .15s, border-color .15s, transform .15s;
  }
  .choice-btn:hover { background: #1e1e38; border-color: var(--accent); transform: translateX(3px); }
  .choice-btn.selected {
    background: linear-gradient(135deg, rgba(124,58,237,.18), rgba(37,99,235,.18));
    border-color: var(--accent);
  }
  .choice-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: #1e1e38; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--sub);
    flex-shrink: 0; transition: background .15s;
  }
  .choice-btn.selected .choice-num { background: var(--accent); border-color: var(--accent); color: #fff; }
  .choice-5 { border-style: dashed; color: var(--sub); font-size: 13px; }
  .choice-5.selected { color: var(--text); }

  /* ===== RESULT ===== */
  #result { padding-top: 16px; }
  .result-hero { text-align: center; padding: 48px 20px 36px; }
  .result-icon { font-size: 56px; margin-bottom: 16px; }
  .result-tag { font-size: 12px; color: var(--sub); letter-spacing: .1em; margin-bottom: 8px; }
  .result-type {
    font-size: 32px; font-weight: 800; margin-bottom: 16px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  /* プレースホルダー */
  .result-desc-placeholder {
    background: #1a1a2e; border: 1px dashed #3d3d6e;
    border-radius: 16px; padding: 28px;
    font-size: 13px; color: var(--sub); line-height: 1.7;
    margin-bottom: 4px; text-align: left;
  }
  .result-desc-placeholder strong { color: #7c6aaf; display: block; margin-bottom: 8px; }

  .notes-area { display: flex; flex-direction: column; gap: 8px; margin: 20px 0; }
  .note {
    background: #1e1a2e; border-left: 3px solid var(--accent);
    border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #c4b5fd; line-height: 1.6;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px; margin-bottom: 20px;
  }
  .card-title { font-size: 11px; color: var(--sub); font-weight: 700; letter-spacing: .1em; margin-bottom: 20px; }

  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .bar-name { width: 90px; font-size: 12px; color: #d1d5db; flex-shrink: 0; text-align: right; font-weight: 500; }
  .bar-track { flex: 1; background: #1e1e38; border-radius: 6px; height: 12px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width 1.1s cubic-bezier(.4,0,.2,1); width: 0; }
  .bar-pct { width: 38px; font-size: 12px; color: var(--sub); font-weight: 600; }

  .btn-retry {
    display: block; width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; padding: 16px;
    font-size: 16px; font-weight: 700; border-radius: 14px;
    cursor: pointer; letter-spacing: .05em;
    transition: transform .2s, box-shadow .2s;
  }
  .btn-retry:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,.4); }

  @media (max-width: 480px) {
    .q-card { padding: 24px; }
    .q-text { font-size: 16px; }
    .bar-name { width: 70px; font-size: 11px; }
    h1 { font-size: 21px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- START -->
  <div id="start" class="screen active">
    <div class="logo">🧠</div>
    <h1>哲学思想タイプ診断</h1>
    <p class="subtitle">
      30の命題にあなたの感覚で答えてください。<br>
      回答から、あなたの思考に宿る哲学的傾向の分布が明らかになります。
    </p>
    <div class="meta-info">
      <span>📋 30問</span>
      <span>⏱ 約5分</span>
      <span>🔍 8思想タイプ</span>
    </div>
    <br>
    <button class="btn-primary" onclick="startQuiz()">診断をはじめる</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="screen">
    <div class="top-bar">
      <div class="q-counter" id="q-counter">1 / 30</div>
      <div class="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>
    </div>
    <div class="q-card">
      <div class="q-label" id="q-label">Q 1</div>
      <div class="q-text" id="q-text"></div>
    </div>
    <div class="choices" id="choices"></div>
  </div>

  <!-- RESULT -->
  <div id="result" class="screen">
    <div class="result-hero">
      <div class="result-icon" id="r-icon">🔮</div>
      <div class="result-tag">あなたの哲学思想タイプ</div>
      <div class="result-type" id="r-type"></div>
    </div>

    <div id="r-notes" class="notes-area"></div>

    <!-- 結果説明プレースホルダー -->
    <div class="result-desc-placeholder">
      <strong>📝 結果説明（準備中）</strong>
      このタイプの詳細な説明・解説は準備中です。<br>
      あなたの思想分布は下のチャートで確認できます。
    </div>

    <div style="height:20px"></div>

    <div class="card">
      <div class="card-title">■ 思想分布チャート</div>
      <div id="chart"></div>
    </div>

    <div style="height:8px"></div>
    <button class="btn-retry" onclick="resetQuiz()">もう一度診断する</button>
  </div>

</div>

<script>

// DATA: philosophy_quiz.json を埋め込み

    { "id": 7,  "text": "世界にもともと意味や目的なんてものは無い。",                               "target": "nihilism",       "direction": "forward", "cross": [{"thought":"existentialism","strength":"med"}],   "choice5": {"thought":"skepticism","pts":1} },
    { "id": 8,  "text": "思い通りにならないことで悩むのは無駄で、変えられることだけを考えればいい。","target": "stoicism",       "direction": "forward", "cross": [],                                               "choice5": {"thought":"skepticism","pts":1} },
    { "id": 9,  "text": "ルールは絶対ではなく、状況次第で破っても構わない。",                       "target": "deontology",     "direction": "reverse", "cross": [{"thought":"utilitarianism","strength":"strong"}], "choice5": {"thought":"skepticism","pts":1} },
    { "id": 10, "text": "何が本当に正しいかは、結局のところ誰にも分からない。",                     "target": "skepticism",     "direction": "forward", "cross": [],                                               "choice5": {"thought":"skepticism","pts":1} },
    { "id": 11, "text": "たとえ全体の利益が増えても、犠牲になる人を出してはいけない。",               "target": "utilitarianism", "direction": "reverse", "cross": [{"thought":"deontology","strength":"strong"}],   "choice5": {"thought":"skepticism","pts":1} },

    { "id": 13, "text": "人格よりも、決められたことをきちんと守れるかどうかが大事だ。",             "target": "virtue_ethics",  "direction": "reverse", "cross": [{"thought":"deontology","strength":"med"}],       "choice5": {"thought":"skepticism","pts":1} },
    { "id": 14, "text": "人にはもともと決まった役割や本分があり、それに沿って生きるのが自然だ。",   "target": "existentialism", "direction": "reverse", "cross": [{"thought":"nihilism","strength":"med"}],         "choice5": {"thought":"skepticism","pts":1} },

    { "id": 17, "text": "誰がやっても通用するルールに従っているかが、正しさの基準だ。",             "target": "deontology",     "direction": "forward", "cross": [{"thought":"utilitarianism","strength":"strong"}], "choice5": {"thought":"nihilism","pts":1} },
    { "id": 18, "text": "一人が深く傷ついても、全体の幸福が大きく増えるなら受け入れられる。",       "target": "utilitarianism", "direction": "forward", "cross": [{"thought":"deontology","strength":"strong"}],   "choice5": {"thought":"skepticism","pts":1} },
    { "id": 19, "text": "多少つらくても、大きな目標のためなら満足を我慢すべきだ。",                 "target": "epicureanism",   "direction": "reverse", "cross": [{"thought":"stoicism","strength":"med"}],         "choice5": {"thought":"skepticism","pts":1} },

    { "id": 27, "text": "立派な人間かどうかは、生き方の良し悪しとは関係ない。",                   "target": "virtue_ethics",  "direction": "reverse", "cross": [],                                               "choice5": {"thought":"skepticism","pts":1} },
    { "id": 28, "text": "絶対に正しい道徳など、どこにも存在しない。",                             "target": "nihilism",       "direction": "forward", "cross": [],                                               "choice5": {"thought":"skepticism","pts":1} },
    { "id": 29, "text": "確実な答えの出ない問題では、判断を保留するのが誠実だ。",                 "target": "skepticism",     "direction": "forward", "cross": [],                                               "choice5": {"thought":"skepticism","pts":1} },
    { "id": 30, "text": "自分の生き方は、生まれや環境でほとんど決まってしまう。",                 "target": "existentialism", "direction": "reverse", "cross": [],                                               "choice5": {"thought":"skepticism","pts":1} }
  ],
  "config": {
    "skepticPromoteCount": 8,
    "hybridGap": 0.08,
    "confidenceFloor": 0.55

};

// ===================================================
// SCORING (scoring.js をそのまま移植)
// ===================================================
function expandChoiceWeights(question, choiceId, rule) {
  const w = {};
  const add = (k, v) => { w[k] = (w[k] || 0) + v; };
  if (choiceId === 5) {
    if (question.choice5) add(question.choice5.thought, question.choice5.pts);
    return w;
  }
  let tv = rule.target_forward[String(choiceId)];
  if (question.direction === "reverse") tv *= rule.target_reverse_multiplier;
  add(question.target, tv);
  if (tv === 2 || tv === -2) {
    for (const c of (question.cross || [])) {
      const k = rule.cross_strength[c.strength];
      add(c.thought, tv === 2 ? -k : k);
    }
  }
  return w;
}

function computeBounds(quiz) {
  const keys = Object.keys(quiz.thoughts);
  const min = {}, max = {};
  for (const k of keys) { min[k] = 0; max[k] = 0; }
  for (const q of quiz.questions) {
    const perChoice = [1, 2, 3, 4, 5].map(cid => expandChoiceWeights(q, cid, quiz.weight_rule));
    for (const k of keys) {
      const vals = perChoice.map(w => w[k] || 0);
      max[k] += Math.max(...vals);
      min[k] += Math.min(...vals);
    }
  }
  return { min, max };
}

function score(quiz, answers) {
  const keys = Object.keys(quiz.thoughts);
  const raw = {};
  for (const k of keys) raw[k] = 0;
  let skepticCount = 0;
  for (const q of quiz.questions) {
    const cid = answers[q.id];
    if (cid == null) continue;
    if (cid === 5) skepticCount++;
    const w = expandChoiceWeights(q, cid, quiz.weight_rule);
    for (const [k, v] of Object.entries(w)) raw[k] += v;
  }
  const { min, max } = computeBounds(quiz);
  const norm = {};
  for (const k of keys) {
    const span = max[k] - min[k];
    norm[k] = span > 0 ? (raw[k] - min[k]) / span : 0.5;
  }
  return { raw, norm, skepticCount };
}

function decideResult(quiz, scored) {
  const { norm, skepticCount } = scored;
  const cfg = quiz.config;
  const L = quiz.thoughts;
  const ranked = Object.keys(norm)
    .map(k => ({ key: k, label: L[k], norm: norm[k] }))
    .sort((a, b) => b.norm - a.norm);
  const top = ranked[0];
  const second = ranked[1];
  const flags = [];
  const forceSkeptic = skepticCount >= cfg.skepticPromoteCount;
  const isHybrid = (top.norm - second.norm) <= cfg.hybridGap;
  const lowConfidence = top.norm < cfg.confidenceFloor;
  let typeKeys;
  if (isHybrid) typeKeys = [top.key, second.key];
  else typeKeys = [top.key];
  if (forceSkeptic && !typeKeys.includes("skepticism")) {
    typeKeys.push("skepticism");
    flags.push("skeptic_promoted");
  }
  if (isHybrid) flags.push("hybrid");
  if (lowConfidence) flags.push("low_confidence");
  const typeLabel = typeKeys.map(k => L[k]).join("×") + "型";
  const displayType = lowConfidence ? "型がはっきりしない（傾向のみ表示）" : typeLabel;
  const notes = [];
  if (flags.includes("hybrid"))
    notes.push("上位2思想が僅差のため、ハイブリッド型として表示しています。");
  if (flags.includes("skeptic_promoted"))
    notes.push("「前提が破綻している」という回答が多く、懐疑主義の傾向を結果に加えました。");
  if (flags.includes("low_confidence"))
    notes.push("最も近い思想でも一致度が低く、特定の型に収まりきらない回答でした。");
  return { typeKeys, typeLabel, displayType, ranked, skepticCount, flags, notes };
}

// ===================================================
// 思想ごとの色・アイコン
// ===================================================
const THOUGHT_META = {
  existentialism: { color: "#a78bfa", icon: "🌑" },
  stoicism:       { color: "#60a5fa", icon: "⚖️" },
  utilitarianism: { color: "#34d399", icon: "📊" },
  deontology:     { color: "#f59e0b", icon: "📜" },
  epicureanism:   { color: "#fb923c", icon: "🌿" },
  virtue_ethics:  { color: "#f472b6", icon: "🏛️" },
  nihilism:       { color: "#f87171", icon: "🌀" },
  skepticism:     { color: "#94a3b8", icon: "❓" },
};

// ===================================================
// UI STATE
// ===================================================
let currentIdx = 0;
let answers = {};  // { questionId: choiceId }

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  currentIdx = 0;
  answers = {};
  show('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = QUIZ.questions[currentIdx];
  const total = QUIZ.questions.length;
  const n = currentIdx + 1;

  document.getElementById('q-counter').textContent = `${n} / ${total}`;
  document.getElementById('prog-fill').style.width = `${((currentIdx) / total) * 100}%`;
  document.getElementById('q-label').textContent = `Q ${n}`;
  document.getElementById('q-text').textContent = q.text;

  const el = document.getElementById('choices');
  el.innerHTML = '';
  QUIZ.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (c.id === 5 ? ' choice-5' : '');
    if (answers[q.id] === c.id) btn.classList.add('selected');
    btn.innerHTML = `<span class="choice-num">${c.id}</span><span>${c.label}</span>`;
    btn.onclick = () => pick(q.id, c.id, btn);
    el.appendChild(btn);
  });
}

function pick(qId, choiceId, btn) {
  // ビジュアル更新
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  answers[qId] = choiceId;

  // 少し待ってから次へ
  setTimeout(() => {
    currentIdx++;
    if (currentIdx < QUIZ.questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 350);
}

function showResult() {
  const scored = score(QUIZ, answers);
  const result = decideResult(QUIZ, scored);

  // タイプ名
  document.getElementById('r-type').textContent = result.displayType;

  // アイコン: 1位の思想のアイコン
  const topKey = result.typeKeys[0];
  document.getElementById('r-icon').textContent = THOUGHT_META[topKey]?.icon || '🔮';

  // ノート
  const notesEl = document.getElementById('r-notes');
  notesEl.innerHTML = '';
  result.notes.forEach(n => {
    const d = document.createElement('div');
    d.className = 'note';
    d.textContent = n;
    notesEl.appendChild(d);
  });

  // チャート
  const chartEl = document.getElementById('chart');
  chartEl.innerHTML = '';
  result.ranked.forEach(r => {
    const meta = THOUGHT_META[r.key] || { color: '#888', icon: '' };
    const pct = Math.round(r.norm * 100);
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-name">${r.label}</div>
      <div class="bar-track">
        <div class="bar-fill" id="bf-${r.key}" style="background:${meta.color}"></div>
      </div>
      <div class="bar-pct">${pct}%</div>
    `;
    chartEl.appendChild(row);
  });

  show('result');

  // バーアニメーション（DOMが確定してから）
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      result.ranked.forEach(r => {
        const el = document.getElementById(`bf-${r.key}`);
        if (el) el.style.width = (r.norm * 100) + '%';
      });
    });
  });
}

function resetQuiz() {
  answers = {};
  currentIdx = 0;
  show('start');
}
</script>
